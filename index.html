    /* ═══════════════════════════════════════════════════════════════
       BODHIRUKKARA DHAMMA SCHOOL — index.html
       Premium Dark Learning Portal  |  github: gridaxiswebworl78
       ═══════════════════════════════════════════════════════════════ */

    /* ── Design Tokens ──────────────────────────────────────────── */
    :root {
      --bg-base:         #07091a;
      --bg-card:         #0f1b32;
      --bg-card-hover:   #132040;

      --accent:          #3b82f6;
      --accent-light:    #60a5fa;
      --accent-dim:      rgba(59, 130, 246, 0.12);
      --accent-glow:     rgba(59, 130, 246, 0.35);

      --pdf:             #dc2626;
      --pdf-hover:       #ef4444;
      --pdf-glow:        rgba(220, 38, 38, 0.32);

      --text-primary:    #f1f5f9;
      --text-secondary:  #94a3b8;
      --text-muted:      #4b5563;

      --border-card:     rgba(59, 130, 246, 0.20);
      --border-line:     rgba(255, 255, 255, 0.06);

      --radius-card:     14px;
      --radius-sm:       8px;
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg-base);
      background-image:
        radial-gradient(ellipse 110% 45% at 50% 0%,  rgba(59,130,246,0.13) 0%, transparent 65%),
        radial-gradient(ellipse  55% 30% at 85% 85%, rgba(99,102,241,0.07) 0%, transparent 55%);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Slim custom scrollbar (WebKit) */
    ::-webkit-scrollbar             { width: 6px; }
    ::-webkit-scrollbar-track       { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb       { background: rgba(59,130,246,0.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ── HEADER ─────────────────────────────────────────────────── */
    .site-header {
      padding: 3.5rem 1.5rem 2.75rem;
      text-align: center;
      position: relative;
    }

    .site-header::after {
      content: "";
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: min(760px, 92%);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,0.55), transparent);
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.28rem 1rem;
      background: var(--accent-dim);
      border: 1px solid rgba(59,130,246,0.28);
      border-radius: 99px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 1.5rem;
    }

    .header-badge::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    .school-name {
      font-size: clamp(1.5rem, 4.5vw, 2.55rem);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
      background: linear-gradient(135deg, #f1f5f9 25%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .school-sub {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── SELECTOR SECTION ───────────────────────────────────────── */
    .selector-section {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 0;
    }

    .selector-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .select-wrap { position: relative; }

    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 1.15rem; top: 50%;
      transform: translateY(-50%);
      color: var(--accent-light);
      pointer-events: none;
      font-size: 1rem;
      line-height: 1;
    }

    #lessonSelect {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1.5px solid var(--border-card);
      border-radius: var(--radius-sm);
      padding: 0.92rem 3rem 0.92rem 1.3rem;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    #lessonSelect:hover,
    #lessonSelect:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    #lessonSelect option {
      background: #111d30;
      color: var(--text-primary);
    }

    /* ── CONTENT AREA ───────────────────────────────────────────── */
    .content-area {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    /* Empty / prompt state */
    .prompt-state {
      text-align: center;
      padding: 5rem 2rem 4rem;
    }

    .prompt-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 1.25rem;
      opacity: 0.65;
    }

    .prompt-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.45rem;
    }

    .prompt-hint {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* Lesson section heading */
    .lesson-heading {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.4rem;
      padding-bottom: 0.9rem;
      border-bottom: 1px solid var(--border-line);
    }

    .heading-dot {
      flex-shrink: 0;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .heading-text {
      font-size: clamp(0.95rem, 2.5vw, 1.12rem);
      font-weight: 600;
      color: var(--text-primary);
    }

    .heading-meta {
      margin-left: auto;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* ── CARDS GRID ─────────────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.2rem;
    }

    @media (max-width: 580px) {
      .cards-grid { grid-template-columns: 1fr; }
    }

    /* ── VIDEO CARD ─────────────────────────────────────────────── */
    .video-card {
      background: var(--bg-card);
      border: 1.5px solid var(--border-card);
      border-radius: var(--radius-card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;

      opacity: 0;
      transform: translateY(18px);
      animation: cardIn 0.42s ease forwards;
    }

    .video-card:nth-child(1) { animation-delay: 0.04s; }
    .video-card:nth-child(2) { animation-delay: 0.10s; }
    .video-card:nth-child(3) { animation-delay: 0.16s; }
    .video-card:nth-child(4) { animation-delay: 0.22s; }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .video-card:hover {
      transform: translateY(-4px);
      border-color: rgba(59, 130, 246, 0.6);
      box-shadow:
        0 8px 30px rgba(0, 0, 0, 0.5),
        0 0  0   1px rgba(59, 130, 246, 0.15),
        0 0  26px var(--accent-glow);
    }

    /* Signature gradient stripe */
    .card-stripe {
      height: 3px;
      background: linear-gradient(90deg, var(--accent) 0%, #818cf8 55%, #a78bfa 100%);
      flex-shrink: 0;
    }

    .card-header {
      padding: 0.8rem 1rem 0.55rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .rec-badge {
      flex-shrink: 0;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-light);
      background: var(--accent-dim);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 4px;
      padding: 0.18rem 0.48rem;
    }

    .card-title {
      font-size: 0.87rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    /* 16:9 responsive iframe */
    .video-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
      flex-shrink: 0;
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    /* Card footer */
    .card-footer {
      padding: 0.75rem 0.9rem 0.9rem;
    }

    .pdf-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.72rem 1rem;
      background: var(--pdf);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.83rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.18s ease, transform 0.15s ease, box-shadow 0.18s ease;
    }

    .pdf-btn:hover {
      background: var(--pdf-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--pdf-glow);
    }

    .pdf-btn:active { transform: translateY(0); box-shadow: none; }

    /* ── FOOTER ─────────────────────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 1.4rem 1.5rem 2.5rem;
      border-top: 1px solid var(--border-line);
      font-size: 0.74rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ── RESPONSIVE ─────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .site-header      { padding: 2.5rem 1.25rem 2rem; }
      .selector-section { padding-top: 2rem; }
      .content-area     { padding-top: 1.75rem; padding-bottom: 3.5rem; }
      .card-title       { font-size: 0.82rem; }
      .pdf-btn          { font-size: 0.78rem; padding: 0.65rem 0.85rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .video-card { animation: none; opacity: 1; transform: none; }
      .header-badge::before { animation: none; }
      .video-card:hover, .pdf-btn:hover { transform: none; }
    }

    const contentArea = document.getElementById('contentArea');

    for (let i = 1; i <= 21; i++) {
      const num = String(i).padStart(2, '0');
      const opt = document.createElement('option');
      opt.value       = i;
      opt.textContent = `Lesson ${num}`;
      select.appendChild(opt);
    }


    /* ── RENDER LESSON ───────────────────────────────────────── */
    function renderLesson(num) {
      const lesson = lessonData[num];
      if (!lesson) return;

      const cardsHTML = lesson.recordings.map((rec, i) => `
        <article class="video-card">
          <div class="card-stripe"></div>
          <div class="card-header">
            <span class="rec-badge">REC ${String(i + 1).padStart(2, '0')}</span>
            <span class="card-title">${rec.title}</span>
          </div>
          <div class="video-wrap">
            <iframe
              src="https://www.youtube.com/embed/${rec.videoId}?rel=0&modestbranding=1"
              title="${lesson.title} &middot; ${rec.title}"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
              loading="lazy">
            </iframe>
          </div>
          <div class="card-footer">
            <a href="${rec.pdf}" class="pdf-btn" target="_blank" rel="noopener noreferrer">
              &#128196; Download Notes (PDF)
            </a>
          </div>
        </article>
      `).join('');

      contentArea.innerHTML = `
        <div class="lesson-heading">
          <span class="heading-dot"></span>
          <span class="heading-text">${lesson.title}</span>
          <span class="heading-meta">REC 01 &ndash; 04</span>
        </div>
        <div class="cards-grid">${cardsHTML}</div>
      `;
    }


    /* ── DROPDOWN CHANGE EVENT ───────────────────────────────── */
    select.addEventListener('change', function () {
      const val = parseInt(this.value, 10);

      if (!val) {
        contentArea.innerHTML = `
          <div class="prompt-state">
            <span class="prompt-icon">&#128218;</span>
            <p class="prompt-title">Select a Lesson Above</p>
            <p class="prompt-hint">Choose a lesson from the dropdown to view its recordings and study materials.</p>
          </div>`;
        return;
      }

      renderLesson(val);

      setTimeout(() => {
        contentArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 60);
    });
